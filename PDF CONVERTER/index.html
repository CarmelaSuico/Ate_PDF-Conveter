<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Generator Form</title>
    <link rel="stylesheet" href="style.css">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="main-wrapper">
    <div class="form-container">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="date" placeholder="Period" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'" oninput="calculateTotal()">
        <input type="text" id="Address" placeholder="Address">
        <input type="text" id="idNumber" placeholder="ID Number">
        <input type="text" id="utr" placeholder="UTR">
        <input type="number" id="monthlyPay" placeholder="Monthly Pay">
        <input type="number" id="materials" placeholder="Cost of Materials">
        <input type="number" id="vat" placeholder="VAT (Amount)">
        <input type="number" id="deduction" placeholder="Deduction">

        <button id="previewBtn">Preview PDF</button>
        <button id="downloadBtn">Download PDF</button>
    </div>

    <div class="preview-container">
        <iframe id="pdfPreview"></iframe>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
